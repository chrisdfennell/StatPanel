name: Feature request
description: Suggest something StatPanel should be able to do
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Worth knowing first: patch 12.0 made most combat statistics **secret
        values**, which addons may display but not read. Anything needing
        arithmetic or comparison on a stat — stat weights, haste breakpoints,
        comparing two snapshots, sending stats to chat — is not possible for any
        addon, not just this one.

        Item level, movement speed, spec and gear data are unaffected.

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the goal rather than the implementation; there may be a better route to it.
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: How do you picture it working?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the addon?
      options:
        - Appearance / theming
        - Stats shown
        - Presets
        - Profiles / automation
        - Gear audit
        - Announce
        - Options interface
        - Something else
    validations:
      required: true
