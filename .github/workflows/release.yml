name: Release

# Push a version tag to cut a release:
#
#   git tag -a v2.0.0 -m "2.0.0"
#   git push origin v2.0.0
#
# That builds StatPanel-2.0.0.zip, attaches it to a GitHub release, and uploads
# it to any distribution site you have configured a token for.
#
# You can also run this manually from the Actions tab. Leaving "dry run" ticked
# builds the zip and attaches it to the run as an artifact WITHOUT publishing
# anything, which is the safe way to check the package looks right.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build the zip only - do not publish or upload anywhere"
        type: boolean
        default: true

permissions:
  contents: write   # needed to create the GitHub release and attach the zip

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The packager takes the version from the tag, but "## Version:" in the
      # TOC is a literal it never rewrites. Tagging v2.1.0 while the TOC still
      # says 2.0.0 publishes an addon that reports the wrong version in-game,
      # and nothing downstream notices. Catch it before anything is uploaded.
      - name: The tag matches the TOC version
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            echo "Manual run - no tag to check."
            exit 0
          fi

          tag_version="${GITHUB_REF_NAME#v}"
          toc_version=$(grep -iE '^##[[:space:]]*Version:' StatPanel.toc |
            head -n1 | cut -d: -f2- | tr -d '[:space:]')

          if [ -z "$toc_version" ]; then
            echo "::error file=StatPanel.toc::No '## Version:' line found"
            exit 1
          fi

          if [ "$tag_version" != "$toc_version" ]; then
            echo "::error file=StatPanel.toc::Tag is $GITHUB_REF_NAME ($tag_version) but the TOC says $toc_version. Update '## Version:', then move the tag."
            exit 1
          fi

          echo "Tag $GITHUB_REF_NAME matches TOC version $toc_version."

          # Advisory only - the whole CHANGELOG ships as the release notes
          # either way, it just won't mention this version.
          if ! grep -qE "^##[[:space:]]*\[?${tag_version//./\\.}\]?" CHANGELOG.md; then
            echo "::warning file=CHANGELOG.md::No '## [$tag_version]' entry - the release notes will not describe this version"
          fi

  package:
    name: Package
    runs-on: ubuntu-latest
    # Never publish on a version mismatch. verify runs on manual dispatch too
    # (where it self-skips), so this doesn't strand dry runs.
    needs: verify

    steps:
      - uses: actions/checkout@v4
        with:
          # The packager derives the version and changelog from git history,
          # so it needs the full history and tags rather than a shallow clone.
          fetch-depth: 0

      - name: Build the addon package
        uses: BigWigsMods/packager@v2
        env:
          # Provided automatically by GitHub; creates the release and attaches
          # the zip to it.
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional. Add these as repository secrets to enable each upload.
          # A missing token simply means that site is skipped.
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
        with:
          # -d builds the zip but skips every upload.
          args: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '-d' || '' }}

      - name: Attach the zip to this run
        uses: actions/upload-artifact@v4
        with:
          name: StatPanel-package
          path: .release/*.zip
          # The packager builds into .release, and upload-artifact treats
          # anything under a dot-directory as hidden and skips it. Without
          # this the step finds no files and the upload is empty.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

      - name: Summarize what was built
        if: always()
        shell: bash
        run: |
          {
            echo "### Package contents"
            echo
            for zip in .release/*.zip; do
              [ -e "$zip" ] || continue
              echo "**$(basename "$zip")**"
              echo '```'
              unzip -l "$zip" | tail -n +4 | head -n -2 | awk '{ $1=$1; print }' | cut -d' ' -f4-
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"
